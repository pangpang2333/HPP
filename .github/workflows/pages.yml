# 发布到 gh-pages 分支（在仓库 Settings → Pages 选「Deploy from branch」→ gh-pages / root）
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 打包静态站点
        run: |
          mkdir -p public
          cp index.html app.js styles.css logo.svg .nojekyll public/
          touch public/.nojekyll

      - name: 发布到 gh-pages 分支
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          clean: true
